<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Explorer | ABE Secure Storage</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>[x-cloak] { display: none !important; }</style>
  </head>
  
  <body
        x-data="{
        page: 'explorer',
        files: [],
        requestedFiles: JSON.parse(localStorage.getItem('abe_requests') || '[]'),
        searchQuery: '',
        user: { firstName: 'Guest', email: '', attributes: [] },

        currentFilter: 'all', 
        currentParentId: 0, 
            breadcrumbs: [{ id: 0, name: 'Root (Home)' }], 
            showFolderModal: false,
            newFolderName: '',
            newFolderPolicy: '', 
            showMoveModal: false,
            itemToMove: null,
            targetFolderId: '',

        getFileStatus(f) {
            const userId = String(localStorage.getItem('user_id'));
            const userRole = localStorage.getItem('user_role');
            const fileOwner = String(f.ownerId || f.owner);

            // 1. Check all possible access conditions
            const isAdmin = userRole === 'ADMIN' || this.user.email === 'SuperAdmin';
            const isOwner = fileOwner === userId;
            const isAbeMatch = typeof this.canDecrypt === 'function' && this.canDecrypt(f.policy, this.user.attributes);
            const isApproved = f.status === 'APPROVED';

            // 2. Return standard status strings matching your filters
            if (isAdmin || isOwner || isAbeMatch || isApproved) {
                return 'granted';
            }
            
            // 3. Check for pending requests (both backend status and local storage cache)
            if (f.status === 'PENDING' || this.requestedFiles.includes(f.fileId || f.id)) {
                return 'pending';
            }

            // 4. Default to denied
            return 'denied';
        },

        get filteredList() {
            if (!this.searchQuery) {
                return this.files;
            }
            
            const query = this.searchQuery.toLowerCase();
            return this.files.filter(file => {
                const name = (file.filename || file.name || '').toLowerCase();
                const policy = (file.policy || '').toLowerCase();
                return name.includes(query) || policy.includes(query);
            });
        },

        fetchFiles() {
                const token = localStorage.getItem('auth_token');
                fetch('http://localhost:8080/abe/list?parentId=' + this.currentParentId, {
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                .then(res => res.json())
                .then(fileData => {
                    this.files = Array.isArray(fileData) ? fileData.reverse() : [];
                })
                .catch(err => console.error('Fetch error:', err));
            },

        openFolder(folder) {
                const folderId = folder.id || folder.fileId;
                this.currentParentId = folderId;
                this.breadcrumbs.push({ id: folderId, name: folder.filename || folder.name });
                this.fetchFiles(); 
            },

            goBack(index) {
                this.breadcrumbs = this.breadcrumbs.slice(0, index + 1);
                this.currentParentId = this.breadcrumbs[this.breadcrumbs.length - 1].id;
                this.fetchFiles();
            },

            async createFolder() {
                if (!this.newFolderName.trim()) return alert('Please enter a folder name.');
                try {
                    const token = localStorage.getItem('auth_token');

                    const url = `http://localhost:8080/abe/mkdir?name=${encodeURIComponent(this.newFolderName)}&parentId=${this.currentParentId}`;
                    
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 
                            'Authorization': 'Bearer ' + token 
                        }

                    });

                    if (res.ok) {
                        alert('Folder created!');
                        this.showFolderModal = false;
                        this.newFolderName = '';
                        this.fetchFiles(); 
                    } else {
                        const err = await res.text();
                        alert('Failed: ' + err);
                    }
                } catch (e) { console.error(e); }
            },

            openMoveModal(file) {
                this.itemToMove = file;
                this.targetFolderId = '';
                this.showMoveModal = true;
            },

            async submitMove() {
                if (this.targetFolderId === '') return alert('Please select a destination folder.');
                
                try {
                    const token = localStorage.getItem('auth_token');
                    const itemId = this.itemToMove.id || this.itemToMove.fileId;

                    const targetIdInt = parseInt(this.targetFolderId);
                    
                    const url = `http://localhost:8080/abe/move?id=${itemId}&targetParentId=${targetIdInt}`;

                    const res = await fetch(url, {
                        method: 'POST', 
                        headers: { 
                            'Authorization': 'Bearer ' + token 
                        }
                    });

                    if (res.ok) {
                        alert('Moved successfully!');
                        this.showMoveModal = false;
                        this.fetchFiles(); 
                    } else {
                        const err = await res.text();
                        alert('Failed to move: ' + err);
                    }
                } catch (e) { console.error(e); }
            },

        canDecrypt(policy, userAttributes) {
            if (!policy || !userAttributes) return false;
            
            // 1. Normalize the current logged-in user's attributes into an array
            let attrs = [];
            if (typeof userAttributes === 'string') {
                attrs = userAttributes.split(',').map(a => a.trim());
            } else if (Array.isArray(userAttributes)) {
                attrs = userAttributes.map(a => typeof a === 'string' ? a.trim() : '');
            }

            // 2. Owner Privilege Check: If the policy contains the current user's ID, grant immediate access
            const userIds = attrs.filter(a => a.toUpperCase().startsWith('ID:'));
            for (let uid of userIds) {
                if (policy.includes(uid)) return true; // Owner can always decrypt
            }

            // 3. Shared Access Check: Strip out owner IDs from the policy, check only public tags (e.g., Manager, HR)
            const requiredAttrs = policy.split(',')
                                        .map(a => a.trim())
                                        .filter(a => a !== '' && !a.toUpperCase().startsWith('ID:'));
            
            // If there are no public tags left after filtering (meaning it wasn't shared), deny access
            if (requiredAttrs.length === 0) return false;
            
            // 4. Final Verdict: Check if the current user possesses ALL the required public tags
            return requiredAttrs.every(attr => attrs.includes(attr));
        },

        downloadFile(fileId, filename) {
            const token = localStorage.getItem('auth_token');
            fetch(`http://localhost:8080/abe/download/${fileId}`, {
                method: 'GET',
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(response => {
                if (!response.ok) throw new Error('Download failed.');
                return response.blob(); 
            })
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = filename || 'downloaded_file'; 
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            })
            .catch(err => {
                console.error('Download error:', err);
                alert('File download failed!');
            });
        },

        async deleteFile(fileId) {
            if (!confirm('Are you sure you want to delete this file? This action cannot be undone.')) {
                return;
            }

            try {
                const token = localStorage.getItem('auth_token'); 
                const response = await fetch(`http://localhost:8080/abe/delete/${fileId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                if (response.ok) {
                    alert('File deleted successfully.');
                    window.location.reload(); 
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    alert('Failed to delete file: ' + (errorData.message || 'Permission denied.'));
                }
            } catch (error) {
                    console.error('Delete error:', error);
                    alert('An error occurred while deleting the file.');
                } 
            },

        async deleteFile(fileId) {
                    if (!confirm('Are you sure you want to delete this file? This action cannot be undone.')) {
                        return;
                    }
                    try {
                        const token = localStorage.getItem('auth_token');
                        const response = await fetch(`http://localhost:8080/abe/delete/${fileId}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': 'Bearer ' + token }
                        });
                        if (response.ok) {
                            alert('File deleted successfully.');
                            window.location.reload();
                        } else {
                            const errorData = await response.json().catch(() => ({}));
                            alert('Failed to delete file: ' + (errorData.message || 'Permission denied.'));
                        }
                    } catch (error) {
                        console.error('Delete error:', error);
                        alert('An error occurred while deleting the file.');
                    }
                },

                get availableTags() {
                    let tags = [];

                    const token = localStorage.getItem('auth_token');
                    if (token && typeof parseJwt === 'function') {
                        const decoded = parseJwt(token);
                        if (decoded) {
                            tags = decoded.attributes || decoded.roles || [];
                        }
                    }

                    if (!tags || tags.length === 0) {
                        for (let i = 0; i < localStorage.length; i++) {
                            const key = localStorage.key(i);
                            const val = localStorage.getItem(key);
                            if (val && (val.includes('ID:') || val.includes('Manager') || val.includes('HR'))) {
                                try {
                                    const parsed = JSON.parse(val);
                                    if (Array.isArray(parsed)) {
                                        tags = parsed;
                                        break; 
                                    }
                                } catch (e) {}
                            }
                        }
                    }

                    if ((!tags || tags.length === 0) && this.user && this.user.attributes) {
                        tags = this.user.attributes;
                    }

                    if (typeof tags === 'string') tags = tags.split(',');
                    if (!Array.isArray(tags)) return [];

                    return tags.map(a => typeof a === 'string' ? a.trim() : '')
                            .filter(a => a !== '' && !a.toUpperCase().startsWith('ID:'));
                },

                shareModalOpen: false,
                shareFileId: null,
                shareFileName: '',
                shareTagsInput: '',

                openShareModal(file) {
                    this.shareFileId = file.fileId || file.id;
                    this.shareFileName = file.filename || file.name;
                    this.shareTagsInput = ''; 
                    this.shareModalOpen = true; 
                },

                async submitShare() {
                    if (!this.shareTagsInput.trim()) {
                        alert('Please select at least one attribute!');
                        return;
                    }
                    try {
                        const token = localStorage.getItem('auth_token'); 
                        const response = await fetch('http://localhost:8080/abe/update-policy', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + token
                            },
                            body: JSON.stringify({
                                id: this.shareFileId,             
                                selectedTags: this.shareTagsInput     
                            })
                        });

                        if (response.ok) {
                            alert('File shared successfully! Policy updated.');
                            this.shareModalOpen = false;
                            window.location.reload(); 
                        } else {
                            const errorData = await response.json().catch(() => ({}));
                            alert('Failed to share: ' + (errorData.message || 'Server error.'));
                        }
                    } catch (error) {
                        console.error('Share error:', error);
                        alert('An error occurred while sharing.');
                    }
                }
            }"

        x-init="
            const token = localStorage.getItem('auth_token');
            if (token) {
                const authHeader = 'Bearer ' + token;
                const decoded = typeof parseJwt === 'function' ? parseJwt(token) : null;
                const savedUser = JSON.parse(localStorage.getItem('user') || '{}');

                user.email = (decoded && decoded.username) || savedUser.email || '';
                user.attributes = savedUser.attributes || (decoded && (decoded.attributes || decoded.roles)) || [];

                console.log('Final Identity for Match:', user.email);

                fetchFiles();
            } else {
                window.location.href = 'signin.html';
            }
        "
    class="bg-transparent"
  >

    <main class="w-full p-6 lg:p-10 scrollbar-hide">
        
        <div class="mb-8">
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">File Explorer</h1>
            <p class="text-gray-500 font-medium mt-1">Manage your access rights and cloud files</p>
        </div>

        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2 text-sm font-bold text-gray-600">
                <template x-for="(crumb, index) in breadcrumbs" :key="crumb.id">
                    <div class="flex items-center gap-2">
                        <span @click="goBack(index)" class="cursor-pointer hover:text-blue-600 transition-colors" x-text="crumb.name"></span>
                        <span x-show="index < breadcrumbs.length - 1" class="text-gray-400">/</span>
                    </div>
                </template>
            </div>

            <button @click="showFolderModal = true" class="px-4 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 shadow-sm">
                + New Folder
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden w-full">
            <div class="px-6 py-5 border-b border-gray-200 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
               <div class="relative w-full max-w-md">
                   <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">🔍</span>
                   <input type="text" x-model="searchQuery" placeholder="Search files or policies..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-xl bg-gray-50 text-sm focus:bg-white transition-all outline-none focus:ring-2 focus:ring-blue-500/20">
               </div>
               <button @click="window.location.reload()" class="px-6 py-2 text-xs font-black text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200 uppercase tracking-wider">Refresh</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50/50 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">File Name</th>
                            <th class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">ABE Policy</th>
                            <th class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                    <template x-for="file in filteredList" :key="file.fileId || file.id || Math.random()">

                        <tr class="hover:bg-gray-50/50 transition-colors">
                            <td class="px-6 py-5">

                                <template x-if="file.isDir">
                                    <div class="flex items-center gap-3">
                                        <div @click="openFolder(file)" class="cursor-pointer text-blue-600 hover:text-blue-800 flex-shrink-0">
                                            <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1H8a3 3 0 00-3 3v4H4a2 2 0 01-2-2V6z"></path></svg>
                                        </div>
                                        <div>
                                            <div @click="openFolder(file)" class="font-bold text-blue-600 hover:text-blue-800 underline cursor-pointer text-base" x-text="file.filename || file.name"></div>
                                            <div class="text-[10px] text-gray-400 font-bold uppercase mt-0.5" x-text="'OWNER: ' + (file.ownerName || (String(file.ownerId) === String(localStorage.getItem('user_id')) ? user.email : file.ownerId))"></div>
                                        </div>
                                    </div>
                                </template>

                                <template x-if="!file.isDir">
                                    <div class="flex items-center gap-3">

                                        <div class="w-10 h-10 flex-shrink-0 rounded-lg bg-gray-50 border border-gray-100 flex items-center justify-center text-gray-400">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                                        </div>
                                        <div>
                                            <div class="font-bold text-gray-900 text-base" x-text="file.filename || file.name"></div>
                                            <div class="text-[10px] text-gray-400 font-bold uppercase mt-0.5" x-text="'OWNER: ' + (file.ownerName || (String(file.ownerId) === String(localStorage.getItem('user_id')) ? user.email : file.ownerId))"></div>
                                        </div>
                                    </div>
                                </template>

                            </td>
                                <td class="px-6 py-5">
                                    <span class="px-2 py-1 rounded bg-gray-100 text-gray-500 text-[10px] font-black tracking-tighter" 
                                        x-text="formatAbePolicy(file.policy)">
                                    </span>
                                </td>

                            <td class="px-6 py-5">
                                <div class="flex items-center justify-end gap-2">

                                    <button x-show="!file.isDir" 
                                            @click="openShareModal(file)"
                                            class="px-4 py-2 bg-blue-50 text-blue-600 border border-blue-200 text-[10px] font-black rounded-lg uppercase tracking-widest hover:bg-blue-500 hover:text-white transition-all">
                                        Share
                                    </button>

                                    <button x-show="String(file.ownerId || file.owner) === String(localStorage.getItem('user_id'))"
                                            @click="openMoveModal(file)"
                                            class="px-4 py-2 bg-yellow-50 text-yellow-600 border border-yellow-200 text-[10px] font-black rounded-lg uppercase tracking-widest hover:bg-yellow-500 hover:text-white transition-all">
                                        Move
                                    </button>

                                    <button x-show="!file.isDir && (user.role === 'ADMIN' || String(file.ownerId || file.owner) === String(localStorage.getItem('user_id')) || canDecrypt(file.policy, user.attributes))"
                                            @click="downloadFile(file.fileId || file.id, file.filename || file.name)"
                                            class="px-4 py-2 bg-gray-900 text-white text-[10px] font-black rounded-lg uppercase tracking-widest hover:bg-black transition-all">
                                        Download
                                    </button>

                                    <button x-show="String(file.ownerId || file.owner) === String(localStorage.getItem('user_id'))"
                                            @click="deleteFile(file.fileId || file.id)"
                                            class="px-4 py-2 bg-red-50 text-red-500 border border-red-200 text-[10px] font-black rounded-lg uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all">
                                        Delete
                                    </button>

                                </div>
                            </td>
                            </tr>
                        </template>
                    </tbody>

                <div x-show="shareModalOpen" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 backdrop-blur-sm transition-opacity">
                    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6" @click.away="shareModalOpen = false">
                        <h3 class="text-lg font-black text-gray-900 mb-2">Share File (Update Policy)</h3>
                        <p class="text-xs text-gray-500 mb-4">Sharing: <span class="font-bold text-blue-600" x-text="shareFileName"></span></p>
                        
                        <div class="mb-5">
                            <label class="block text-xs font-bold text-gray-700 mb-2">Select Attributes</label>
                            
                            <div class="flex flex-wrap gap-2 mb-3">
                                <template x-for="attr in availableTags" :key="attr">
                                    <button @click="shareTagsInput = shareTagsInput ? shareTagsInput + ',' + attr : attr"
                                            class="px-3 py-1 rounded-full text-[10px] font-black border border-blue-200 text-blue-600 hover:bg-blue-50 transition-colors"
                                            x-text="attr">
                                    </button>
                                </template>
                                
                                <div x-show="availableTags.length === 0" class="text-xs text-red-500 bg-red-50 px-3 py-2 rounded-lg w-full border border-red-100">
                                    ⚠️ System couldn't find your attributes. Please ensure you logged in again after assigning them.
                                </div>
                            </div>

                            <div class="p-3 bg-gray-50 border border-gray-200 rounded-lg min-h-[40px] text-xs font-mono text-gray-800 flex items-center justify-between">
                                <span x-text="shareTagsInput || 'No attributes selected'"></span>
                                <button x-show="shareTagsInput" @click="shareTagsInput = ''" class="text-red-500 text-[10px] font-bold hover:underline">CLEAR</button>
                            </div>
                        </div>

                        <div class="flex justify-end gap-3">
                            <button @click="shareModalOpen = false" class="px-5 py-2.5 rounded-xl text-xs font-bold text-gray-600 bg-gray-100 hover:bg-gray-200">Cancel</button>
                            <button @click="submitShare()" class="px-5 py-2.5 rounded-xl text-xs font-bold text-white bg-green-600 hover:bg-green-700">Confirm Share</button>
                        </div>
                    </div>
                </div>

                </table>
            </div>
        </div>
      </main>

    <script>
    function parseJwt(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        } catch (e) {
            return null;
        }
    }

        window.formatAbePolicy = function(policy) {
        if (!policy) return '--';

        // 1. Split the policy string by comma or pipe
        const parts = policy.split(/[,|]/);

        // 2. Clean up whitespace and filter out invalid tags or internal ID tags
        const filtered = parts.map(p => p.trim()).filter(p => {
            return p && 
                   p.toUpperCase() !== '&' && 
                   !p.toUpperCase().includes('ID:');
        });

        // 3. CRITICAL FIX: Join the public tags using a comma instead of an ampersand (&)
        return filtered.length > 0 ? filtered.join(', ') : 'OWNER ONLY';
    };

</script>
    
    
    <div x-show="showFolderModal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" x-cloak>
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl">
            <h3 class="text-lg font-bold mb-4">Create New Folder</h3>
            
            <label class="block text-xs text-gray-500 font-bold mb-2">FOLDER NAME</label>
            <input type="text" x-model="newFolderName" class="w-full p-3 border border-gray-200 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500" placeholder="e.g., Financial Reports">
            
            <label class="block text-xs text-gray-500 font-bold mb-2">ABE POLICY (Optional, comma separated)</label>

            <div class="flex gap-3">
                <button @click="showFolderModal = false" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold hover:bg-gray-200">Cancel</button>
                <button @click="createFolder" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">Create</button>
            </div>
        </div>
    </div>

    <div x-show="showMoveModal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" x-cloak>
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl">
            <h3 class="text-lg font-bold mb-2">Move Item</h3>
            <p class="text-sm text-gray-500 mb-4">Moving: <span class="font-bold text-gray-800" x-text="itemToMove?.filename || itemToMove?.name"></span></p>
            
            <label class="block text-xs text-gray-500 font-bold mb-2">SELECT DESTINATION FOLDER</label>
        
            <select x-model="targetFolderId" class="w-full p-3 border border-gray-200 rounded-xl mb-6 focus:ring-2 focus:ring-blue-500 bg-white cursor-pointer font-medium text-gray-700">
                <option value="" disabled>-- Select a folder --</option>
                
                <option value="0">🏠 Root (Home)</option>
                
                <template x-if="breadcrumbs.length > 1">
                    <option :value="breadcrumbs[breadcrumbs.length - 2].id">
                        ⬆️ Up to: <span x-text="breadcrumbs[breadcrumbs.length - 2].name"></span>
                    </option>
                </template>

                <template x-for="folder in files.filter(f => f.isDir && (f.id || f.fileId) !== (itemToMove?.id || itemToMove?.fileId))">
                    <option :value="folder.id || folder.fileId">
                        📁 <span x-text="folder.filename || folder.name"></span>
                    </option>
                </template>
            </select>
            
            <div class="flex gap-3">
                <button @click="showMoveModal = false" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold hover:bg-gray-200">Cancel</button>
                <button @click="submitMove" class="flex-1 py-3 bg-yellow-500 text-white rounded-xl font-bold hover:bg-yellow-600">Confirm Move</button>
            </div>
        </div>
    </div>

  </body>
</html>
