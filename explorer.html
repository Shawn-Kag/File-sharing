<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Explorer | ABE Secure Storage</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>[x-cloak] { display: none !important; }</style>
  </head>
  
  <body
        x-data="{
        page: 'explorer',
        files: [],
        requestedFiles: JSON.parse(localStorage.getItem('abe_requests') || '[]'),
        searchQuery: '',
        user: { firstName: 'Guest', email: '', attributes: [] },

        currentFilter: 'all', 

        getFileStatus(f) {
            const userId = String(localStorage.getItem('user_id'));
            const userRole = localStorage.getItem('user_role');
            const fileOwner = String(f.ownerId || f.owner);

            // 1. Check all possible access conditions
            const isAdmin = userRole === 'ADMIN' || this.user.email === 'SuperAdmin';
            const isOwner = fileOwner === userId;
            const isAbeMatch = typeof this.canDecrypt === 'function' && this.canDecrypt(f.policy, this.user.attributes);
            const isApproved = f.status === 'APPROVED';

            // 2. Return standard status strings matching your filters
            if (isAdmin || isOwner || isAbeMatch || isApproved) {
                return 'granted';
            }
            
            // 3. Check for pending requests (both backend status and local storage cache)
            if (f.status === 'PENDING' || this.requestedFiles.includes(f.fileId || f.id)) {
                return 'pending';
            }

            // 4. Default to denied
            return 'denied';
        },

        get filteredList() {
            return this.files.filter(f => {
                const searchStr = this.searchQuery.toLowerCase();
                const matchSearch = (f.filename || f.fileName || f.name || '').toLowerCase().includes(searchStr) || 
                                    (f.policy || '').toString().toLowerCase().includes(searchStr);
                if (!matchSearch) return false;

                if (this.currentFilter === 'all') return true;
                return this.getFileStatus(f) === this.currentFilter;
            });
        },

        canDecrypt(policy, userAttributes) {
            if (!policy || !userAttributes) return false;
            const requiredAttrs = policy.split(' AND ').map(a => a.trim());
            return requiredAttrs.every(attr => userAttributes.includes(attr));
        },

        requestAccess(fileId, fileName) {
            if(!this.requestedFiles.includes(fileId)) {
                this.requestedFiles.push(fileId);
                localStorage.setItem('abe_requests', JSON.stringify(this.requestedFiles));
                alert(`Access request for '${fileName}' has been sent!`);
            }
        },

        downloadFile(fileId, filename) {
            const token = localStorage.getItem('auth_token');
            fetch(`http://localhost:8080/abe/download/${fileId}`, {
                method: 'GET',
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(response => {
                if (!response.ok) throw new Error('Download failed.');
                return response.blob(); 
            })
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = filename || 'downloaded_file'; 
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            })
            .catch(err => {
                console.error('Download error:', err);
                alert('File download failed!');
            });
        },

        async deleteFile(fileId) {
            if (!confirm('Are you sure you want to delete this file? This action cannot be undone.')) {
                return;
            }

            try {
                const token = localStorage.getItem('auth_token'); 
                const response = await fetch(`http://localhost:8080/abe/delete/${fileId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                if (response.ok) {
                    alert('File deleted successfully.');
                    window.location.reload(); 
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    alert('Failed to delete file: ' + (errorData.message || 'Permission denied.'));
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('An error occurred while deleting the file.');
            }
        }, 

        get stats() {
            let granted = 0; 
            let denied = 0; 
            let pending = 0;

            // Use the single source of truth: getFileStatus
            this.files.forEach(f => {
                const status = this.getFileStatus(f);
                if (status === 'granted') {
                    granted++;
                } else if (status === 'pending') {
                    pending++;
                } else {
                    denied++;
                }
            });

            return { granted, denied, pending };
        }
    }"
        x-init="
            const token = localStorage.getItem('auth_token');
            if (token) {
                const authHeader = 'Bearer ' + token;
                const decoded = typeof parseJwt === 'function' ? parseJwt(token) : null;
                const savedUser = JSON.parse(localStorage.getItem('user') || '{}');

                user.email = (decoded && decoded.username) || savedUser.email || '';
                user.attributes = savedUser.attributes || (decoded && (decoded.attributes || decoded.roles)) || [];

                console.log('Final Identity for Match:', user.email);

                fetch('http://localhost:8080/abe/list', { 
                    headers: { 'Authorization': authHeader } 
                })
                .then(res => res.json())
                .then(fileData => {
                    files = Array.isArray(fileData) ? fileData.reverse() : [];
                })
                .catch(err => console.error('Fetch error:', err));
            } else {
                window.location.href = 'signin.html';
            }
        "
    class="bg-transparent"
  >

    <main class="w-full p-6 lg:p-10 scrollbar-hide">
        
        <div class="mb-8">
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">File Explorer</h1>
            <p class="text-gray-500 font-medium mt-1">Manage your access rights and cloud files</p>
        </div>

        <div class="grid grid-cols-1 gap-6 sm:grid-cols-3 mb-8 w-full" x-cloak>
            
            <div @click="currentFilter = currentFilter === 'granted' ? 'all' : 'granted'" class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm flex items-center gap-4 cursor-pointer transition-all duration-300" :class="currentFilter === 'granted' ? 'ring-2 ring-green-500 transform scale-105' : 'hover:bg-gray-50'">
                <div class="flex h-14 w-14 items-center justify-center rounded-full bg-green-100 text-green-600 text-2xl">🟢</div>
                <div>
                    <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Access Granted</h4>
                    <h3 class="mt-1 text-3xl font-black text-gray-900" x-text="stats.granted"></h3>
                </div>
            </div>

            <div @click="currentFilter = currentFilter === 'pending' ? 'all' : 'pending'" class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm flex items-center gap-4 cursor-pointer transition-all duration-300" :class="currentFilter === 'pending' ? 'ring-2 ring-yellow-400 transform scale-105' : 'hover:bg-gray-50'">
                <div class="flex h-14 w-14 items-center justify-center rounded-full bg-yellow-100 text-yellow-600 text-2xl">🟡</div>
                <div>
                    <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Pending Request</h4>
                    <h3 class="mt-1 text-3xl font-black text-gray-900" x-text="stats.pending"></h3>
                </div>
            </div>

            <div @click="currentFilter = currentFilter === 'denied' ? 'all' : 'denied'" class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm flex items-center gap-4 cursor-pointer transition-all duration-300" :class="currentFilter === 'denied' ? 'ring-2 ring-red-400 transform scale-105' : 'hover:bg-gray-50'">
                <div class="flex h-14 w-14 items-center justify-center rounded-full bg-red-100 text-red-600 text-2xl">🔴</div>
                <div>
                    <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Access Denied</h4>
                    <h3 class="mt-1 text-3xl font-black text-gray-900" x-text="stats.denied"></h3>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden w-full">
            <div class="px-6 py-5 border-b border-gray-200 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
               <div class="relative w-full max-w-md">
                   <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">🔍</span>
                   <input type="text" x-model="searchQuery" placeholder="Search files or policies..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-xl bg-gray-50 text-sm focus:bg-white transition-all outline-none focus:ring-2 focus:ring-blue-500/20">
               </div>
               <button @click="window.location.reload()" class="px-6 py-2 text-xs font-black text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200 uppercase tracking-wider">Refresh</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50/50 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">File Name</th>
                            <th class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">ABE Policy</th>
                            <th class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">Status</th>
                            <th class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                    <template x-for="file in filteredList" :key="file.fileId || file.id || Math.random()">

                        <tr class="hover:bg-gray-50/50 transition-colors">
                            <td class="px-6 py-5">
                                <div class="flex items-center gap-3">
                                    <span class="text-2xl">📄</span>
                                    <div>
                                        <div class="font-bold text-gray-900" x-text="file.filename || file.name"></div>
                                        <div class="text-[10px] text-gray-400 font-bold uppercase" x-text="'Owner: ' + (file.ownerName || (String(file.ownerId) === String(localStorage.getItem('user_id')) ? localStorage.getItem('username') : file.ownerId))"></div>
                                    </div>
                                </div>
                            </td>
                                <td class="px-6 py-5">
                                    <span class="px-2 py-1 rounded bg-gray-100 text-gray-500 text-[10px] font-black tracking-tighter" 
                                        x-text="formatAbePolicy(file.policy)">
                                    </span>
                                </td>

                                <td class="px-6 py-5 text-center">
                                    <!-- 1. Approved: Admin, Owner, Decryptable by ABE, or explicitly Approved by Owner -->
                                    <template x-if="user.role === 'ADMIN' || String(file.ownerId || file.owner) === String(localStorage.getItem('user_id')) || (typeof canDecrypt === 'function' && canDecrypt(file.policy, user.attributes)) || file.status === 'APPROVED'">
                                        <span class="px-3 py-1 rounded-full text-[10px] font-black bg-green-50 text-green-600 border border-green-100 uppercase">Approved</span>
                                    </template>

                                    <!-- 2. Pending: Requested but not yet processed by Owner -->
                                    <template x-if="user.role !== 'ADMIN' && String(file.ownerId || file.owner) !== String(localStorage.getItem('user_id')) && !canDecrypt(file.policy, user.attributes) && file.status === 'PENDING'">
                                        <span class="px-3 py-1 rounded-full text-[10px] font-black bg-yellow-50 text-yellow-600 border border-yellow-100 uppercase">Pending</span>
                                    </template>

                                    <!-- 3. Rejected: Explicitly rejected by Owner -->
                                    <template x-if="user.role !== 'ADMIN' && String(file.ownerId || file.owner) !== String(localStorage.getItem('user_id')) && !canDecrypt(file.policy, user.attributes) && file.status === 'REJECTED'">
                                        <span class="px-3 py-1 rounded-full text-[10px] font-black bg-red-50 text-red-600 border border-red-100 uppercase">Rejected</span>
                                    </template>

                                    <!-- 4. No Access: Default state before any request is made -->
                                    <template x-if="user.role !== 'ADMIN' && String(file.ownerId || file.owner) !== String(localStorage.getItem('user_id')) && !canDecrypt(file.policy, user.attributes) && (!file.status || file.status === 'NONE')">
                                        <span class="px-3 py-1 rounded-full text-[10px] font-black bg-gray-50 text-gray-400 border border-gray-100 uppercase">No Access</span>
                                    </template>
                                </td>

                                <td class="px-6 py-5">
                                    <div class="flex items-center justify-end gap-2">
                                        
                                        <button x-show="String(file.ownerId || file.owner) === String(localStorage.getItem('user_id'))" 
                                                @click="deleteFile(file.fileId || file.id)" 
                                                class="px-4 py-2 bg-red-50 text-red-500 border border-red-200 text-[10px] font-black rounded-lg uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all">
                                            Delete
                                        </button>

                                        <button x-show="user.role === 'ADMIN' || String(file.ownerId || file.owner) === String(localStorage.getItem('user_id')) || canDecrypt(file.policy, user.attributes) || file.status === 'APPROVED'"
                                                @click="downloadFile(file.fileId || file.id, file.filename)"
                                                class="px-4 py-2 bg-gray-900 text-white text-[10px] font-black rounded-lg uppercase tracking-widest hover:bg-black transition-all">
                                            Download
                                        </button>

                                        <button x-show="user.role !== 'ADMIN' && String(file.ownerId || file.owner) !== String(localStorage.getItem('user_id')) && !canDecrypt(file.policy, user.attributes) && (!file.status || file.status === 'REJECTED')"
                                                @click="requestAccess(file.fileId || file.id, file.filename)"
                                                class="px-4 py-2 bg-blue-600 text-white text-[10px] font-black rounded-lg uppercase tracking-widest hover:bg-blue-700 transition-all">
                                            Request
                                        </button>

                                        <span x-show="file.status === 'PENDING'" class="text-[10px] text-gray-400 italic font-bold">Waiting for Owner...</span>
                                        
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
      </main>

    <script>
    function parseJwt(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        } catch (e) {
            return null;
        }
    }

        window.formatAbePolicy = function(policy) {
        if (!policy) return '--';

        const parts = policy.split(/[,]/); 
        
        const filtered = parts.map(p => p.trim()).filter(p => {
            return p && 
                p.toUpperCase() !== '&' && 
                !p.toUpperCase().includes('ID:'); 
        });

        return filtered.length > 0 ? filtered.join(' & ') : 'OWNER ONLY';
    };

</script>
    
  </body>
</html>
