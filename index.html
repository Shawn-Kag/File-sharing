<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | ABE Secure Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
  </head>
  
    <body class="bg-transparent" x-data="uploadPanel()">
    <script>
        function uploadPanel() {
            return {
                files: [],
                fileName: '',
                policy: '',
                // Initialize directly from localStorage
                userAttributes: JSON.parse(localStorage.getItem('user_attributes') || '[]'),

                async init() {
                    const token = localStorage.getItem('auth_token');
                    if (!token) {
                        // Redirect the WHOLE window if session expired
                        window.top.location.href = 'signin.html';
                        return;
                    }

                    // 1. Fetch File List
                    try {
                        const res = await fetch('http://localhost:8080/abe/list', {
                            headers: { 'Authorization': 'Bearer ' + token }
                        });
                        if (res.ok) this.files = await res.json();
                    } catch (e) {
                        console.error('Fetch error:', e);
                    }

                    // 2. Re-sync attributes to be safe
                    const saved = localStorage.getItem('user_attributes');
                    if (saved) {
                        this.userAttributes = JSON.parse(saved);
                        console.log('✅ Attributes loaded in iframe:', this.userAttributes);
                    }
                }
            }
        }
    </script>
      
    <main class="w-full p-6 lg:p-10">
        
        <div class="mb-8">
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Main Dashboard</h1>
            <p class="text-gray-500 font-medium">ABE Control Panel</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-blue-100 p-8 mb-8 w-full">
            <h3 class="text-xl font-bold mb-6 text-gray-800">Upload & Encrypt</h3>
            
        <div 
            class="p-12 border-2 border-dashed rounded-3xl text-center transition-all duration-300 relative"
            :class="isDragging ? 'border-blue-500 bg-blue-50/50 scale-[1.01] shadow-inner' : 'border-gray-200 bg-gray-50'"
            x-data="{ isDragging: false }"
            @dragover.prevent="isDragging = true"
            @dragenter.prevent="isDragging = true"
            @dragleave.prevent="isDragging = false"
            @drop.prevent="
                isDragging = false; 
                if($event.dataTransfer.files.length > 0) {
                    $refs.fileInput.files = $event.dataTransfer.files;
                    $refs.fileInput.dispatchEvent(new Event('change'));
                }
            "
        >
            <label class="cursor-pointer flex flex-col items-center w-full">
                <input type="file"
                    x-ref="fileInput"
                    accept=".pdf,.docx,.png,.jpg,.jpeg,.zip"
                    class="hidden"
                    @change="selectedFile = $event.target.files[0]; fileName = selectedFile ? selectedFile.name : ''" 
                />

                <div class="text-5xl mb-4 transition-transform" :class="isDragging ? '-translate-y-2' : ''">
                    <span x-show="!isDragging">📁</span>
                    <span x-show="isDragging" x-cloak class="animate-pulse">📥</span>
                </div>
                
                <p class="font-black mb-2 tracking-tight" :class="isDragging ? 'text-blue-600' : 'text-gray-900'">
                    <span x-show="!isDragging">Drag files here or click to upload</span>
                    <span x-show="isDragging" x-cloak class="text-blue-500">Release to Capture!</span>
                </p>
                
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em] mb-6 opacity-60">
                    PDF • DOCX • PNG • JPG • ZIP
                </p>
                
                <div class="px-8 py-2.5 bg-white text-blue-600 font-black rounded-full text-[10px] uppercase tracking-widest border border-blue-100 shadow-sm hover:bg-blue-600 hover:text-white transition-all">
                    Browse Local Files
                </div>

                <div class="mt-6 min-h-[24px]">
                    <template x-if="fileName">
                        <div class="flex items-center gap-2 bg-blue-600 text-white px-4 py-1.5 rounded-full shadow-lg animate-bounce-short">
                            <span class="text-xs">📎</span>
                            <span class="text-xs font-black italic" x-text="fileName"></span>
                        </div>
                    </template>
                    <template x-if="!fileName">
                        <span class="text-gray-300 text-xs font-bold tracking-tight italic">Waiting for file...</span>
                    </template>
                </div>
            </label>
        </div>
            
 <div class="mt-8 mb-6 p-8 bg-blue-50/50 rounded-3xl border border-blue-100 shadow-inner">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🛡️</span>
                <h4 class="text-xs font-black text-blue-900 uppercase tracking-widest">ABE Policy Builder</h4>
            </div>
            <button @click="policy = ''" class="text-[10px] font-black text-red-400 hover:text-red-600 uppercase transition-colors">Clear All</button>
        </div>

        <div class="space-y-6">
            <div class="w-full min-h-[60px] p-4 rounded-2xl bg-white border-2 border-dashed border-blue-200 flex flex-wrap items-center gap-2">
                <template x-if="!policy">
                    <span class="text-gray-300 text-xs font-bold italic">Select attributes below to build access policy...</span>
                </template>
                <template x-if="policy">
                    <div class="flex flex-wrap items-center gap-2">
                        <template x-for="part in policy.split(' AND ')" :key="part">
                            <span class="px-3 py-1 bg-blue-600 text-white text-[10px] font-black rounded-lg shadow-sm animate-fadeIn" x-text="part"></span>
                        </template>
                    </div>
                </template>
            </div>

            <div class="pt-2">
                <p class="text-[10px] font-black text-gray-400 mb-4 uppercase tracking-widest ml-1">Your Available Attributes:</p>
                <div class="flex flex-wrap gap-2">
                    <template x-for="attr in userAttributes" :key="attr">
                        <button type="button" @click="policy = policy ? policy + ' , ' + attr : attr" 
                                class="px-4 py-2 bg-white border border-gray-200 text-gray-700 rounded-lg text-xs font-bold shadow-sm flex items-center gap-2 hover:border-blue-300 hover:text-blue-600 hover:shadow transition-all cursor-pointer active:scale-95 select-none">
                            <div class="w-1.5 h-1.5 rounded-full bg-blue-400"></div>
                            <span x-text="attr"></span>
                        </button>
                    </template>
                    
                    <template x-if="userAttributes.length === 0">
                        <div class="text-xs text-gray-400 italic bg-gray-100 px-4 py-2 rounded-xl w-full text-center">
                            You don't have any attributes to share.
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>


        <button 
            @click="uploadFile()" 
            class="w-full mt-8 py-4 bg-blue-600 text-white font-black rounded-xl ..."
        >
            Encrypt & Upload to Cloud
        </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden w-full">
            <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-xl font-bold text-gray-800">Cloud Secure Files</h3>
                <span class="px-3 py-1 bg-green-50 text-green-600 text-xs font-bold rounded-full" x-text="files.length + ' Files Secured'"></span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50/50 border-b border-gray-100">
                        <tr>
                            <th class="px-8 py-4 text-xs font-black text-gray-400 uppercase tracking-wider">File Name</th>
                            <th class="px-8 py-4 text-xs font-black text-gray-400 uppercase tracking-wider text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <template x-if="files.length === 0">
                            <tr>
                                <td colspan="2" class="px-8 py-12 text-center text-gray-400">No encrypted files found in the vault.</td>
                            </tr>
                        </template>

                        <template x-for="file in files" :key="file.fileId">
                            <tr class="hover:bg-gray-50/50 transition-colors">
                                <td class="px-8 py-5">
                                    <div class="flex items-center gap-3">
                                        <span class="text-xl">📄</span>
                                        <span class="font-bold text-gray-700" x-text="file.filename"></span>
                                    </div>
                                </td>
                                <td class="px-8 py-5 text-right">
                                    <button @click="downloadFile(file.id, file.filename)" class="px-5 py-2 bg-gray-900 text-white text-xs font-black rounded-lg hover:bg-black transition-all">
                                        Decrypt & Download
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        function uploadPanel() {
            return {
                files: [],
                fileName: '',
                selectedFile: null,
                policy: '',
                userAttributes: [],
                baseUrl: 'http://localhost:8080/abe',

                async init() {
                    console.log("Alpine Initializing...");
                    await this.fetchUserAttributes();
                    await this.fetchFileList();
                },

                async fetchUserAttributes() {
                    try {
                        // Fetch attributes from local storage saved during login
                        const saved = localStorage.getItem('user_attributes');
                        
                        if (saved && saved !== '[]') {
                            console.log("Successfully loaded attributes from local storage:", saved);
                            const parsed = JSON.parse(saved);
                            
                            // Ensure the data is formatted as an array
                            let rawArray = Array.isArray(parsed) ? parsed : parsed.split(',');
                            
                            // Assign to state and filter out system ID tags
                            this.userAttributes = rawArray
                                .map(a => a.trim())
                                .filter(a => a && !a.startsWith('ID:'));
                                
                        } else {
                            console.warn("No attribute data found in local storage. Please log in again.");
                        }
                    } catch (e) {
                        console.error("Failed to parse local attributes:", e);
                    }
                },

                async fetchFileList() {
                    const token = localStorage.getItem('auth_token');
                    try {
                        const res = await fetch(`${this.baseUrl}/list`, {
                            headers: { 'Authorization': 'Bearer ' + token }
                        });
                        if (res.ok) {
                            this.files = await res.json();
                        }
                    } catch (e) {
                        console.error("Fetch list error:", e);
                    }
                },


                async uploadFile() {
                // 1. Check our direct variable instead of refs
                    if (!this.selectedFile) {
                        return alert('Please select a file first!');
                    }
                    
                    if (!this.policy) {
                        return alert('Please build an access policy using the attributes!');
                    }

                    // Prepare form data for backend
                    const token = localStorage.getItem('auth_token');
                    const formData = new FormData();
                    formData.append('file', this.selectedFile);
                    formData.append('selectedTags', this.policy.replace(/\s*&\s*/g, ','));
                    
                    // --- FIXED KEY GENERATION ---
                    // 1. Define a safe character set
                    const charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                    
                    // 2. Build a string of exactly 32 characters
                    let rawKey = '';
                    for (let i = 0; i < 32; i++) {
                        rawKey += charset.charAt(Math.floor(Math.random() * charset.length));
                    }
                    // 3. Convert to Base64 (32 chars will always perfectly encode without data loss)
                    const base64Key = btoa(rawKey);
                    
                    formData.append('key', base64Key); 

                    try {
                        const res = await fetch(`${this.baseUrl}/encrypt-file`, {
                            method: 'POST',
                            headers: { 'Authorization': 'Bearer ' + token },
                            body: formData
                        });

                        if (res.ok) {
                            alert('File Encrypted and Uploaded Successfully!');
                            await this.init(); 
                            this.policy = '';  
                            this.selectedFile = null;
                            this.fileName = '';
                        } else {
                            const errorMsg = await res.text();
                            alert('Upload failed. Check console for details.');
                            console.error('Backend returned an error:', errorMsg);
                        }
                    } catch (err) {
                        console.error('Network Error:', err);
                        alert('Connection failed.');
                    }
                },

                async downloadFile(fileId, filename) {
                const token = localStorage.getItem('auth_token');
                if (!token) return alert('Please login first!');

                try {
                    // IMPORTANT: Make sure this URL matches your Java backend's download endpoint!
                    // It might be /download/{id} or /decrypt-file/{id} depending on your ABEController
                    const res = await fetch(`${this.baseUrl}/download/${fileId}`, {
                        method: 'GET',
                        headers: { 
                            'Authorization': 'Bearer ' + token 
                        }
                    });

                    if (res.ok) {
                        // Convert the encrypted stream back into a downloadable file
                        const blob = await res.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        // Use the original filename, or a fallback name
                        a.download = filename || 'decrypted_file'; 
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        window.URL.revokeObjectURL(url);
                        alert('File Decrypted and Downloaded Successfully!');
                    } else {
                        const errorMsg = await res.text();
                        console.error("Download failed:", errorMsg);
                        alert('Decryption Failed! You might not have the required attributes (Policy missing).');
                    }
                } catch (e) {
                    console.error("Network error during download:", e);
                    alert('Network error. Is the backend running?');
                }
            }

            }
        }
    </script>

  </body>
</html>
