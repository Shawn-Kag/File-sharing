<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABE Secure System</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      [x-cloak] { display: none !important; }
      iframe { border: none; width: 100%; height: 100%; }
    </style>
  </head>
  <body x-data="{ 
      showEditModal: false,
      user: { 
        firstName: localStorage.getItem('username') || 'Admin', 
        email: localStorage.getItem('user_email') || 'admin@example.com',
        role: localStorage.getItem('user_role') || 'USER'
    }
    }" class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-72 flex flex-col border-r bg-white h-full shrink-0">
      <a href="welcome.html" class="block p-8 font-black text-2xl text-blue-600 italic cursor-pointer hover:text-blue-700 hover:opacity-80 transition-all">SecureShare</a>
      <nav class="flex-1 px-6 space-y-2">
        <a href="index.html" target="contentFrame" class="flex items-center gap-3 p-3 font-bold text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all">🏠 Dashboard</a>
        <a href="analytica.html" target="contentFrame" class="flex items-center gap-3 p-3 font-bold text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all">📈 Analytica</a>
        <a href="explorer.html" target="contentFrame" class="flex items-center gap-3 p-3 font-bold text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all">🗂️ File Explorer</a>
        <!-- Admin Panel link - only visible or accessible to Admin -->
        <a x-show="user.role === 'ADMIN'" href="admin.html" target="contentFrame" class="flex items-center gap-3 p-3 font-bold text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all">🛡️ Admin Panel</a>
      </nav>

      <div class="p-6 border-t">
        <div @click="showEditModal = true" class="flex items-center gap-3 p-2 cursor-pointer hover:bg-gray-50 rounded-xl transition-all group">
          <div class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold" x-text="user.firstName.charAt(0)"></div>
          <div class="overflow-hidden min-w-0">
            <p class="text-sm font-black text-gray-900 truncate" x-text="user.firstName"></p>
            <p class="text-[10px] text-gray-400 truncate" x-text="user.email"></p>
          </div>
          <span class="ml-auto text-xs">⚙️</span>
        </div>
        <button onclick="localStorage.clear(); window.location.href='signin.html';" 
        class="w-full mt-4 py-2 text-xs font-bold ...">
            Log Out
        </button>
      </div>
    </aside>

    <main class="flex-1 h-screen overflow-hidden bg-gray-50">
      <iframe id="content-frame" name="contentFrame" src="index.html" class="w-full h-full border-none"></iframe>
    </main>

    <div x-show="showEditModal" class="fixed inset-0 z-[999] flex items-center justify-center bg-black/40 backdrop-blur-sm" x-cloak>
        <div @click.outside="showEditModal = false" class="bg-white rounded-3xl p-8 w-full max-w-md">
            <h2 class="text-2xl font-black mb-6">Edit Profile</h2>
            <form @submit.prevent="showEditModal = false; alert('Saved!')" class="space-y-4">
                <input type="text" x-model="user.firstName" placeholder="First Name" class="w-full p-3 rounded-xl bg-gray-50 border-none">
                <input type="email" x-model="user.email" placeholder="Email" class="w-full p-3 rounded-xl bg-gray-50 border-none">
                <div class="flex gap-3">
                    <button type="button" @click="showEditModal = false" class="flex-1 py-3 font-bold text-gray-400">Cancel</button>
                    <button type="submit" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl">Save</button>
                </div>
            </form>
        </div>
    </div>
  </body>
</html>
