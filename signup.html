<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Secure System</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-800 flex h-screen items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-black text-gray-900 mb-2">Sign Up</h1>
            <p class="text-sm text-gray-500">Create your ABE credentials</p>
        </div>
        
        <form id="registerForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="mb-1.5 block text-xs font-bold text-gray-700 uppercase">First Name</label>
                    <input type="text" id="fname" required class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm focus:border-blue-500 focus:bg-white focus:outline-none" />
                </div>
                <div>
                    <label class="mb-1.5 block text-xs font-bold text-gray-700 uppercase">Last Name</label>
                    <input type="text" id="lname" required class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm focus:border-blue-500 focus:bg-white focus:outline-none" />
                </div>
            </div>
            <div>
                <label class="mb-1.5 block text-xs font-bold text-gray-700 uppercase">Email</label>
                <input type="email" id="email" required class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm focus:border-blue-500 focus:bg-white focus:outline-none" />
            </div>
            <div>
                <label class="mb-1.5 block text-xs font-bold text-gray-700 uppercase">Password</label>
                <input type="password" id="password" required class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm focus:border-blue-500 focus:bg-white focus:outline-none" />
            </div>
            
            <button type="submit" class="w-full py-3 mt-6 text-sm font-bold text-white transition-all bg-gray-900 rounded-xl hover:bg-black shadow-lg active:scale-95">
                Create Account
            </button>
        </form>
        
        <p class="mt-6 text-sm text-center text-gray-500">
            Already have an account? <a href="signin.html" class="text-blue-600 font-bold hover:underline">Sign In</a>
        </p>
    </div>

    <script>
// Optimized Signup Logic
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // 1. Match the IDs EXACTLY as shown in your HTML image
    const fInput = document.getElementById('fname'); // Lowercase as per your screenshot
    const lInput = document.getElementById('lname'); // Lowercase as per your screenshot
    const eInput = document.getElementById('email');
    const pInput = document.getElementById('password');

    // 2. Safety check: Ensure no element is null
    if (!fInput || !lInput || !eInput || !pInput) {
        console.error("ID mismatch! Check if IDs in HTML match the script.");
        return;
    }

    // 3. Construct the payload according to RegisterRequest.java
    const payload = {
        username: fInput.value + lInput.value, // Combine fname and lname
        email: eInput.value,                   // Matches String email[cite: 1]
        password: pInput.value                 // Matches String password[cite: 1]
    };

    try {
        // 4. Send the request to the backend Base URL[cite: 1]
        const res = await fetch('http://localhost:8080/abe/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        // 5. Handle the response
        if (res.ok) {
            alert("Account created successfully!");
            window.location.href = 'signin.html';
        } else {
            const result = await res.json();
            alert("Registration failed: " + (result.message || "Unknown error"));
        }
    } catch (err) {
        console.error("Network Error:", err);
        alert("Server connection failed. Please ensure the Spring Boot app is running.");
    }
});
    </script>
  </body>
</html>
