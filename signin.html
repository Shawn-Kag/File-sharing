<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Secure System</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-800 flex h-screen items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-black text-gray-900 mb-2">Sign In</h1>
            <p class="text-sm text-gray-500">Access the ABE Secure Storage</p>
        </div>
        
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="mb-1.5 block text-sm font-bold text-gray-700">Email</label>
                <input type="email" id="email" required placeholder="admin@example.com" class="h-12 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm text-gray-800 focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" />
            </div>
            <div>
                <label class="mb-1.5 block text-sm font-bold text-gray-700">Password</label>
                <input type="password" id="password" required placeholder="Enter password" class="h-12 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm text-gray-800 focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" />
            </div>
            <button type="submit" class="w-full py-3 mt-4 text-sm font-bold text-white transition-all bg-blue-600 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-500/30 active:scale-95">
                Sign In
            </button>
        </form>
        
        <p class="mt-6 text-sm text-center text-gray-500">
            Don't have an account? <a href="signup.html" class="text-blue-600 font-bold hover:underline">Sign Up</a>
        </p>
    </div>

    <script>
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
          const res = await fetch('http://localhost:8080/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const result = await res.json();
          if (res.ok) {
            localStorage.setItem('auth_token', result.token);
            window.location.href = 'layout.html';
          } else {
            alert(result.message);
          }
        } catch (err) {
          alert("Server connection failed! Please run 'node server.js'");
        }
      });
    </script>
  </body>
</html>
