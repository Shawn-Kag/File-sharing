<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytica | ABE Secure Storage</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        [x-cloak] { display: none !important; }
        /* 隐藏滚动条让页面更美观 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  
  <body
    x-data="{ 
      page: 'analytica', 
      isLoggedIn: false,
      files: [],
      user: { firstName: 'Guest', email: '' }
    }"
    x-init="
      const token = localStorage.getItem('auth_token');
      if (token) {
        isLoggedIn = true;
        fetch('http://localhost:3000/api/user/me', { headers: { 'Authorization': token } })
        .then(res => res.json())
        .then(data => { 
            user.firstName = data.firstName || 'User';
            user.email = data.email || 'guest@example.com';
            return fetch('http://localhost:3000/api/files');
        })
        .then(res => res.json())
        .then(fileData => { 
            files = Array.isArray(fileData) ? fileData.reverse() : []; 
            setTimeout(() => {
                if(window.renderDynamicCharts) {
                    window.renderDynamicCharts(files, user.email);
                }
            }, 100);
        })
        .catch(err => { isLoggedIn = false; });
      } else {
        window.location.href = 'signin.html';
      }
    "
    class="bg-transparent text-gray-800"
  >

    <main class="p-6 lg:p-8 scrollbar-hide">
      
      <div class="mb-8">
          <h1 class="text-3xl font-black text-gray-900 tracking-tight">Data Analytics</h1>
          <p class="text-gray-500 font-medium mt-1">Real-time Attribute-Based Encryption storage metrics</p>
      </div>

      <div class="grid grid-cols-12 gap-6">
        
        <div class="col-span-12 space-y-6 xl:col-span-7">
          
          <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
            <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
              <div class="mb-4 flex h-11 w-11 items-center justify-center rounded-lg bg-gray-100 text-gray-600">
                <span class="text-xl">🗄️</span>
              </div>
              <div class="flex items-end justify-between">
                <div>
                  <h4 class="text-sm font-medium text-gray-500">Total System Files</h4>
                  <h3 class="mt-1 text-3xl font-bold text-gray-900" x-text="files.length"></h3>
                </div>
                <span class="inline-flex items-center gap-1 rounded-md bg-blue-50 px-2 py-1 text-xs font-medium text-blue-700">Secure Vault</span>
              </div>
            </div>

            <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
              <div class="mb-4 flex h-11 w-11 items-center justify-center rounded-lg bg-gray-100 text-gray-600">
                <span class="text-xl">🔑</span>
              </div>
              <div class="flex items-end justify-between">
                <div>
                  <h4 class="text-sm font-medium text-gray-500">My Encrypted Uploads</h4>
                  <h3 class="mt-1 text-3xl font-bold text-gray-900" x-text="files.filter(f => f.owner === user.email).length"></h3>
                </div>
                <span class="inline-flex items-center gap-1 rounded-md bg-green-50 px-2 py-1 text-xs font-medium text-green-700">Active</span>
              </div>
            </div>
          </div>

          <div class="rounded-2xl border border-gray-200 bg-white px-6 pt-6 pb-4 shadow-sm">
            <div class="mb-4 flex justify-between">
              <h3 class="text-lg font-bold text-gray-900">Upload Volume (By Month)</h3>
            </div>
            <div id="chartOne" class="-ml-4 -mb-2"></div>
          </div>
        </div>

        <div class="col-span-12 xl:col-span-5">
          <div class="h-full rounded-2xl border border-gray-200 bg-white p-6 shadow-sm flex flex-col">
            <div class="mb-4 flex justify-between">
              <div>
                <h3 class="text-lg font-bold text-gray-900">Storage Ownership</h3>
                <p class="text-sm text-gray-500 text-xs">Your files vs System</p>
              </div>
            </div>
            <div id="chartTwo" class="mx-auto flex justify-center mt-4"></div>
            <div class="mt-4 text-center">
              <p class="text-sm font-medium text-gray-500 mb-6 italic">
                You own <strong class="text-gray-900" x-text="files.filter(f => f.owner === user.email).length"></strong> out of <strong class="text-gray-900" x-text="files.length"></strong> files.
              </p>
              <div class="mt-auto grid grid-cols-2 gap-2 border-t border-gray-100 pt-6">
                <div>
                  <p class="text-xs text-gray-500">My Files</p>
                  <p class="text-base font-bold text-gray-900 mt-1" x-text="files.filter(f => f.owner === user.email).length"></p>
                </div>
                <div class="border-l border-gray-100">
                  <p class="text-xs text-gray-500">System Total</p>
                  <p class="text-base font-bold text-gray-900 mt-1" x-text="files.length"></p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-span-12">
          <div class="rounded-2xl border border-gray-200 bg-white px-6 pt-6 pb-2 shadow-sm">
            <h3 class="text-lg font-bold text-gray-900 mb-4">Activity Trend</h3>
            <div id="chartThree" class="-ml-4 -mb-2"></div>
          </div>
        </div>

      </div>
    </main>

    <script>
      window.renderDynamicCharts = function(files, currentUserEmail) {
        const totalMonthly = Array(12).fill(0);
        const myMonthly = Array(12).fill(0);

        files.forEach(file => {
           const date = new Date(file.uploadDate);
           if (!isNaN(date)) {
               const monthIndex = date.getMonth();
               totalMonthly[monthIndex] += 1;
               if (file.owner === currentUserEmail) {
                   myMonthly[monthIndex] += 1;
               }
           }
        });

        const myFilesCount = files.filter(f => f.owner === currentUserEmail).length;
        const totalFilesCount = files.length === 0 ? 1 : files.length;
        const ownershipPercentage = Math.round((myFilesCount / totalFilesCount) * 100);

        // Chart 1
        new ApexCharts(document.querySelector("#chartOne"), {
          series: [{ name: 'Total Uploads', data: totalMonthly }],
          chart: { type: 'bar', height: 335, toolbar: { show: false } },
          colors: ['#4338CA'], 
          plotOptions: { bar: { horizontal: false, columnWidth: '40%', borderRadius: 3 } },
          xaxis: { categories: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'] },
          yaxis: { min: 0, max: Math.max(...totalMonthly) + 2, tickAmount: 4 }
        }).render();

        // Chart 2
        new ApexCharts(document.querySelector("#chartTwo"), {
          series: [ownershipPercentage],
          chart: { 
            type: 'radialBar', 
            height: 380, 
            sparkline: { enabled: true } 
          },
          plotOptions: {
            radialBar: {
              startAngle: -90,
              endAngle: 90,
              hollow: { size: '70%' },
              track: { background: '#F3F4F6', strokeWidth: '95%' },
              dataLabels: {
                name: {
                  show: true,
                  fontSize: '14px',
                  fontWeight: 700,
                  color: '#64748b',
                  offsetY: -10 
                },
                value: {
                  offsetY: -50, 
                  fontSize: '36px',
                  fontWeight: 900,
                  color: '#1e293b',
                  formatter: function (val) { return val + "%"; }
                }
              }
            }
          },
          fill: { 
            type: 'gradient',
            gradient: {
                shade: 'dark',
                type: 'horizontal',
                gradientToColors: ['#6366f1'], 
                stops: [0, 100]
            }
          },
          stroke: { lineCap: 'round' }
        }).render();

        // Chart 3
        new ApexCharts(document.querySelector("#chartThree"), {
          series: [
            { name: 'System Total', data: totalMonthly },
            { name: 'My Uploads', data: myMonthly }
          ],
          chart: { type: 'area', height: 350, toolbar: { show: false } },
          colors: ['#4338CA', '#10B981'],
          stroke: { curve: 'smooth', width: 2 },
          xaxis: { categories: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'] }
        }).render();
      };
    </script>
  </body>
</html>
